                "text": "PathWordle is a strategic word puzzle game where you connect adjacent letters (horizontally, vertically, or diagonally) on a 6×6 grid to form paths and guess hidden 5-letter words. Each day features a new daily challenge, or you can practice unlimitedly. The game uses color-coded feedback similar to Wordle to guide your guesses."

              "@type": "Question",
              "name": "How is PathWordle different from Wordle?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Unlike Wordle where you type letters directly, PathWordle requires you to build paths through a grid by connecting adjacent letters. This adds a spatial strategy element - you must navigate around the grid while forming words. You can connect letters in any direction (horizontal, vertical, or diagonal), creating more strategic depth."
              }
            },
            {
              "@type": "Question",
              "name": "Can I connect letters diagonally?",

                "@type": "Answer",

              }
            },
            {
              "@type": "Question",
              "name": "What do the colors mean in PathWordle?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "PathWordle uses a color-coding system similar to Wordle: Green indicates the letter is correct and in the right position, Yellow shows the letter is in the word but wrong position, and Gray means the letter is not in the target word at all."
              }
            },
            {
              "@type": "Question",
              "name": "Is PathWordle free to play?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes, PathWordle is completely free to play. There are no ads, no subscriptions, and no in-app purchases. Just pure word puzzle enjoyment!"
              }
            },
            {
              "@type": "Question",
              "name": "Can I play PathWordle on my phone?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Absolutely! PathWordle is fully optimized for mobile browsers and works great on both phones and tablets. You can even install it as a Progressive Web App (PWA) for a native app-like experience."
              }
            },

              "@type": "Question",
              "name": "How often do new challenges appear?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "New daily challenges appear every day at midnight in your local timezone. Each daily challenge is the same for all players worldwide, so you can compare your results with friends."
              }
            },
            {
              "@type": "Question",
              "name": "Does PathWordle track my statistics?",
              "acceptedAnswer": {

                "text": "Yes! PathWordle tracks your games played, win rate, current streak, and max streak. You can view these stats anytime by clicking the statistics icon in the top navigation bar."

              "name": "Can I share my results?",
              "acceptedAnswer": {

              "acceptedAnswer": {
